<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>SafeKid Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
.card{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);border-radius:20px;padding:28px 22px;max-width:400px;width:100%;text-align:center}
.logo{font-size:3rem;margin-bottom:8px}
h1{color:#fff;font-size:1.4rem;font-weight:700;margin-bottom:4px}
.sub{color:rgba(255,255,255,.4);font-size:.78rem;margin-bottom:24px}
.links{display:grid;gap:10px}
a{display:block;text-decoration:none;padding:13px 16px;border-radius:12px;font-size:.88rem;font-weight:600;transition:all .2s}
.a1{background:linear-gradient(135deg,#FF6B6B,#FF69B4,#A855F7);color:#fff}
.a2{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);color:#fff}
.a2:hover{background:rgba(255,255,255,.12)}
.tg{margin-top:16px;background:rgba(0,136,204,.1);border:1px solid rgba(0,136,204,.2);border-radius:10px;padding:8px 14px;color:#29b6f6;font-size:.72rem}
</style>
</head>
<body>
<div class="card">
  <div class="logo">🛡️</div>
  <h1>SafeKid</h1>
  <p class="sub">Telegram Edition</p>
  <div class="links">
    <a href="/birthday.html" class="a1">🎂 Halaman Ulang Tahun</a>
    <a href="/parent.html" class="a2">📊 Monitor Web</a>
  </div>
  <div class="tg">📨 Hasil monitor via <b>Telegram Bot</b></div>
</div>
</body>
</html>
